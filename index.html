<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EduQuiz AI Master v32 Final</title>

    <!-- 필수 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff1f2; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- 🧚‍♀️ Firebase Config (선생님 전용 설정) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBuKO5Iia70QyrgrXGgRqJsLChHhHMFREg",
            authDomain: "edu-quiz-lovely.firebaseapp.com",
            projectId: "edu-quiz-lovely",
            storageBucket: "edu-quiz-lovely.firebasestorage.app",
            messagingSenderId: "889544643228",
            appId: "1:889544643228:web:cbd9a57b3bbe2c61231359",
            measurementId: "G-1DMEK883S9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'nursing-quiz-final-v26';

        // --- 🧠 Gemini AI API Key (선생님 키) ---
        const geminiApiKey = "AIzaSyALNeGgRQZz1Z1D1aNW_RX0ZHHg1_pPtlM"; 
        const MODEL_NAME = "gemini-2.0-flash-exp"; // 더 빠르고 안정적인 모델로 변경 시도

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('landing');
            const [status, setStatus] = useState(null);
            const [units, setUnits] = useState([]);
            const [loading, setLoading] = useState(false);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [quizResults, setQuizResults] = useState(null);
            const [startTime, setStartTime] = useState(null);
            const [newUnitTitle, setNewUnitTitle] = useState('');
            const [showPwModal, setShowPwModal] = useState(false);
            const [pwInput, setPwInput] = useState('');
            const teacherPassword = "1234";

            // API 호출 지연 방지 및 상세 로그 출력 fetch
            const fetchQuizData = async (url, options) => {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errorDetail = await response.json();
                    throw new Error(errorDetail.error?.message || "AI 서버 응답 오류");
                }
                return response.json();
            };

            // 1. Authentication
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        setUser({ uid: 'guest', isAnonymous: true });
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { if (u) setUser(u); });
                return () => unsubscribe();
            }, []);

            // 2. Data Real-time Sync
            useEffect(() => {
                const unitsCol = collection(db, 'artifacts', appId, 'public', 'data', 'units');
                const unsubscribe = onSnapshot(unitsCol, (ss) => {
                    const data = ss.docs.map(d => ({ id: d.id, ...d.data() }));
                    setUnits(data.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
                }, (err) => {
                    setStatus({ type: 'error', text: "데이터베이스 연결 오류" });
                });
                return () => unsubscribe();
            }, []);

            const processFile = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        if (file.type === "application/pdf") {
                            resolve({ data: e.target.result, type: 'application/pdf', name: file.name });
                        } else {
                            const img = new Image();
                            img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const maxDim = 800; // 용량 최적화 위해 리사이징
                                let width = img.width, height = img.height;
                                if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                                else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                                canvas.width = width; canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                resolve({ data: canvas.toDataURL('image/jpeg', 0.4), type: 'image/jpeg' });
                            };
                        }
                    };
                });
            };

            const handleCreateUnit = async (e) => {
                const files = Array.from(e.target.files);
                if (!newUnitTitle.trim() || files.length === 0) return;
                setLoading(true);
                setStatus({ type: 'info', text: "자료 등록 중..." });
                try {
                    const processedFiles = await Promise.all(files.map(file => processFile(file)));
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'units'), {
                        title: newUnitTitle, files: processedFiles, createdAt: serverTimestamp()
                    });
                    setNewUnitTitle('');
                    setStatus({ type: 'success', text: "자료가 안전하게 저장되었습니다! ✨" });
                } catch (err) { 
                    setStatus({ type: 'error', text: "저장 실패! 용량이 너무 큽니다." });
                } finally { setLoading(false); }
            };

            const checkPassword = () => {
                if (pwInput === teacherPassword) { setView('teacher'); setShowPwModal(false); setPwInput(''); setStatus(null); } 
                else { setStatus({ type: 'error', text: "비밀번호 오류" }); setPwInput(''); }
            };

            // [수정] 정교해진 AI 퀴즈 생성 및 에러 추적
            const generateQuiz = async () => {
                if (!selectedUnit) return;
                setLoading(true);
                setStatus({ type: 'info', text: "AI가 자료를 읽고 있습니다..." });
                
                const systemPrompt = `당신은 보건간호과 교사입니다. 제공된 이미지/PDF 자료를 분석하여 학생용 5지선다형 퀴즈 5개를 만드세요. 반드시 아래 형식의 순수 JSON 배열로만 응답하세요: [{"id":1,"question":"질문","options":["1","2","3","4","5"],"correctAnswer":0,"explanation":"해설"}]`;
                
                try {
                    const contents = [{
                        role: "user",
                        parts: [
                            { text: `단원 제목: ${selectedUnit.title}. 위 단원의 내용을 바탕으로 문제를 생성해줘.` },
                            ...selectedUnit.files.map(f => ({
                                inlineData: {
                                    mimeType: f.type.includes('pdf') ? 'application/pdf' : 'image/jpeg',
                                    data: f.data.split(',')[1]
                                }
                            }))
                        ]
                    }];

                    const responseData = await fetchQuizData(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { responseMimeType: "application/json" } })
                    });
                    
                    const rawText = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("AI가 응답을 생성하지 못했습니다.");
                    
                    const cleanJson = rawText.replace(/```json/gi, "").replace(/```/gi, "").trim();
                    const parsedQuestions = JSON.parse(cleanJson);
                    
                    setCurrentQuestions(parsedQuestions);
                    setCurrentQuestionIndex(0); 
                    setAnswers({}); 
                    setView('quiz'); 
                    setStartTime(Date.now()); 
                    setStatus(null);
                } catch (err) { 
                    console.error("Quiz Error:", err);
                    setStatus({ 
                        type: 'error', 
                        text: `AI 오류: ${err.message.includes('API key') ? '키 인증 실패' : '자료가 너무 많거나 복잡합니다.'}` 
                    }); 
                } finally { setLoading(false); }
            };

            const Header = () => (
                <header className="bg-white border-b border-pink-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm shrink-0">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('landing'); setStatus(null); }}>
                        <div className="bg-pink-400 p-2 rounded-2xl text-white shadow-lg shadow-pink-100"><Icon name="sparkles" size={20} /></div>
                        <h1 className="text-lg font-black text-pink-500 italic leading-none">EduQuiz Sweet</h1>
                    </div>
                    {status && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl font-bold text-[11px] z-[200] animate-bounce border-2 ${status.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-500' : 'bg-emerald-50 border-emerald-200 text-emerald-500'}`}>
                            {status.text}
                            <button onClick={() => setStatus(null)} className="ml-2 font-black opacity-30">×</button>
                        </div>
                    )}
                </header>
            );

            if (view === 'teacher') return (
                <div className="min-h-screen bg-orange-50/30 flex flex-col items-center">
                    <Header />
                    <main className="max-w-2xl w-full p-6 space-y-8">
                        <button onClick={() => setView('landing')} className="text-orange-400 font-black flex items-center gap-2 text-left"><Icon name="chevron-left" /> 메인으로</button>
                        <div className="bg-white p-8 rounded-[3.5rem] shadow-xl border-4 border-orange-100 text-center space-y-6">
                            <div className="bg-orange-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto text-orange-50 shadow-inner"><Icon name="folder-plus" size={32}/></div>
                            <h3 className="text-xl font-black text-slate-700">단원 등록소</h3>
                            <div className="space-y-4 text-left">
                                <input type="text" placeholder="단원 제목을 입력하세요" value={newUnitTitle} onChange={(e) => setNewUnitTitle(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 border-orange-50 bg-slate-50 outline-none focus:border-orange-400 font-bold" />
                                <label className={`cursor-pointer w-full py-5 rounded-2xl font-black transition-all flex items-center justify-center gap-3 shadow-lg ${loading ? 'bg-slate-100 text-slate-400' : 'bg-orange-400 text-white active:scale-95'}`}>
                                    <Icon name={loading ? "refresh-cw" : "file-up"} className={loading ? "animate-spin" : ""} />
                                    <span>{loading ? '처리 중...' : '사진 또는 PDF 등록'}</span>
                                    <input type="file" className="hidden" accept="image/*,application/pdf" multiple onChange={handleCreateUnit} disabled={loading} />
                                </label>
                            </div>
                        </div>
                        <div className="space-y-3 pb-20 w-full text-left">
                            <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest px-4">등록된 목록 ({units.length})</h4>
                            {units.length === 0 ? <div className="text-center py-10 text-slate-300 font-bold italic">자료를 기다리고 있어요 😿</div> : units.map(u => (
                                <div key={u.id} className="bg-white p-6 rounded-3xl flex justify-between items-center shadow-sm border border-orange-50 hover:shadow-md transition-shadow">
                                    <span className="font-bold text-slate-700">{u.title}</span>
                                    <button onClick={() => { if(confirm('삭제할까요?')) deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', u.id)) }} className="text-rose-200 hover:text-rose-500 p-2"><Icon name="trash-2" /></button>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );

            if (view === 'student_setup') return (
                <div className="min-h-screen flex flex-col items-center">
                    <Header />
                    <main className="max-w-xl w-full p-6 space-y-10 text-center">
                        <button onClick={() => setView('landing')} className="text-pink-400 font-black flex items-center gap-2 text-left"><Icon name="chevron-left" /> 메인으로</button>
                        <div className="bg-white rounded-[4rem] p-10 shadow-2xl border-8 border-white space-y-8">
                            <h2 className="text-3xl font-black text-slate-700 italic leading-none tracking-tighter">Study Mode ✨</h2>
                            <section className="text-left space-y-4">
                                <h4 className="text-xs font-black text-pink-400 uppercase tracking-widest flex items-center gap-2"><Icon name="heart" size={14} fill="currentColor" /> 1. 공부할 단원 선택</h4>
                                <div className="grid gap-2 max-h-64 overflow-y-auto custom-scrollbar">
                                    {units.length === 0 ? <div className="text-center py-10 text-slate-300 font-bold italic">등록된 자료가 없어요 😿</div> : units.map(u => (
                                        <button key={u.id} onClick={() => setSelectedUnit(u)} className={`text-left px-5 py-4 rounded-2xl border-2 transition-all font-bold flex items-center justify-between ${selectedUnit?.id === u.id ? 'border-pink-300 bg-pink-50 text-pink-600 shadow-lg' : 'border-slate-50 bg-slate-50/50 hover:border-pink-100'}`}>
                                            <span>{u.title}</span>
                                            {selectedUnit?.id === u.id && <Icon name="check" className="text-pink-500" size={18}/>}
                                        </button>
                                    ))}
                                </div>
                            </section>
                            <button onClick={generateQuiz} disabled={!selectedUnit || loading} className={`w-full py-6 rounded-3xl font-black text-xl shadow-xl transition-all ${loading ? 'bg-slate-100 text-slate-300' : 'bg-gradient-to-r from-pink-400 to-purple-500 text-white active:scale-95'}`}>
                                {loading ? 'AI가 분석 중입니다...' : '학습 시작하기! ✨'}
                            </button>
                        </div>
                    </main>
                </div>
            );

            if (view === 'quiz') {
                const q = currentQuestions[currentQuestionIndex];
                if (!q) return null;
                return (
                    <div className="h-screen flex flex-col bg-white overflow-hidden text-left">
                        <header className="px-6 py-5 flex items-center justify-between border-b border-pink-50 shrink-0">
                            <button onClick={() => setView('student_setup')} className="text-slate-300"><Icon name="x" size={28}/></button>
                            <span className="font-black text-pink-400 text-lg">{currentQuestionIndex + 1} / {currentQuestions.length}</span>
                            <div className="px-3 py-1 bg-pink-400 text-white rounded-xl text-xs font-bold">{Math.floor((Date.now() - startTime)/1000)}s</div>
                        </header>
                        <main className="flex-1 p-8 flex flex-col items-center justify-center space-y-10 overflow-y-auto">
                            <h2 className="text-2xl font-black text-slate-700 text-center leading-snug max-w-lg">{q.question}</h2>
                            <div className="w-full max-w-lg space-y-4">
                                {q.options.map((opt, i) => (
                                    <button key={i} onClick={() => setAnswers({...answers, [currentQuestionIndex]: i})} className={`w-full text-left p-6 rounded-[2.5rem] border-4 transition-all font-bold text-lg flex items-center gap-5 ${answers[currentQuestionIndex] === i ? 'border-pink-400 bg-pink-50 text-pink-600 shadow-md' : 'border-slate-50 bg-slate-50 hover:border-pink-100'}`}>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black shrink-0 ${answers[currentQuestionIndex] === i ? 'bg-pink-400 text-white' : 'bg-slate-700 text-white'}`}>{i + 1}</div>
                                        <span>{opt}</span>
                                    </button>
                                ))}
                            </div>
                        </main>
                        <footer className="p-8 border-t border-pink-50 bg-white shrink-0 text-center flex flex-col items-center">
                            <div className="max-w-lg w-full flex gap-4">
                                <button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-5 bg-slate-50 text-slate-300 font-bold rounded-2xl">이전</button>
                                {currentQuestionIndex === currentQuestions.length - 1 ? 
                                    <button onClick={() => { const s = currentQuestions.filter((q, i) => answers[i] === q.correctAnswer).length; setQuizResults({ score: s, total: currentQuestions.length, percentage: Math.round((s/currentQuestions.length)*100) }); setView('result'); }} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] bg-pink-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">결과 확인</button> :
                                    <button onClick={() => setCurrentQuestionIndex(p => p + 1)} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] bg-slate-800 text-white py-5 rounded-2xl font-black text-xl active:scale-95 transition-all">다음 문제</button>
                                }
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') return (
                <div className="min-h-screen bg-pink-50 flex flex-col items-center">
                    <Header />
                    <main className="w-full max-w-md p-6 space-y-6 overflow-y-auto pb-24 text-center">
                        <div className="bg-white rounded-[4rem] shadow-2xl p-10 text-center border-8 border-white">
                            <div className="bg-yellow-300 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-white shadow-xl animate-bounce text-center shadow-yellow-100"><Icon name="star" size={50} fill="currentColor" /></div>
                            <h2 className="text-7xl font-black mb-2 text-slate-800 tracking-tighter">{quizResults?.percentage}%</h2>
                            <p className="font-black text-pink-400 text-xl mb-10">{quizResults?.score} / {quizResults?.total} 맞힘!</p>
                            <div className="space-y-6 text-left mb-10 border-t border-pink-50 pt-8">
                                {currentQuestions.map((q, i) => (
                                    <div key={i} className={`p-6 rounded-3xl border-2 ${answers[i] === q.correctAnswer ? 'border-emerald-100 bg-emerald-50/30' : 'border-rose-100 bg-rose-50/30'}`}>
                                        <p className="font-bold text-slate-700 mb-2 leading-tight">{i+1}. {q.question}</p>
                                        <p className="text-xs text-slate-400 leading-relaxed italic border-t border-white/50 pt-2 mt-2">{q.explanation}</p>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setView('landing')} className="w-full bg-slate-800 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl active:scale-95">메인으로</button>
                        </div>
                    </main>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    {showPwModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl text-center border-4 border-orange-50 animate-shake">
                                <h3 className="text-xl font-black text-slate-700 mb-6 text-center">선생님 인증</h3>
                                <input autoFocus type="password" placeholder="Pass" maxLength={4} value={pwInput} onChange={(e) => setPwInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && checkPassword()} className="w-full px-6 py-5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-orange-300 text-center font-bold text-2xl tracking-[0.5em] mb-6 shadow-inner" />
                                <div className="flex gap-3 text-center">
                                    <button onClick={() => { setShowPwModal(false); setPwInput(''); }} className="flex-1 py-4 rounded-2xl bg-slate-100 text-slate-500 font-bold">취소</button>
                                    <button onClick={checkPassword} className="flex-1 py-4 rounded-2xl bg-orange-400 text-white font-bold">확인</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="bg-white p-12 rounded-[5rem] shadow-2xl border-8 border-pink-50 w-full max-w-sm relative overflow-hidden">
                        <div className="bg-pink-400 w-20 h-20 rounded-[2.5rem] flex items-center justify-center mx-auto mb-10 text-white shadow-lg animate-bounce shadow-pink-100">
                            <Icon name="heart" size={40} fill="currentColor" />
                        </div>
                        <h2 className="text-4xl font-black mb-4 text-slate-800 leading-tight tracking-tighter text-center">간호의 기초<br/><span className="bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-purple-500 text-center">AI 캔디 퀴즈</span></h2>
                        <p className="text-slate-400 font-bold mb-14 text-[10px] tracking-[0.3em] uppercase italic opacity-70 text-center leading-none">Master Edition v32 Final ✨</p>
                        <div className="space-y-4 text-center">
                            <button onClick={() => setShowPwModal(true)} className="w-full bg-orange-50 hover:bg-orange-100 p-7 rounded-[2.5rem] text-orange-600 font-black flex items-center justify-center gap-4 transition-all border-2 border-orange-100 shadow-sm active:scale-95"><Icon name="key" /> 선생님 모드</button>
                            <button onClick={() => units.length > 0 ? setView('student_setup') : alert('자료를 먼저 등록해주세요!')} className="w-full bg-pink-50 hover:bg-pink-100 p-7 rounded-[2.5rem] text-pink-600 font-black flex items-center justify-center gap-4 transition-all border-2 border-pink-100 shadow-sm active:scale-95"><Icon name="graduation-cap" /> 학생 모드</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
